<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-id="th-modified">Cơm Bé Trâm - Quản lý</title>

    <style>
        :root { --primary-red: #d32f2f; --success-green: #4caf50; --warning-orange: #ff9800; --blue: #2196f3; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        h2 { text-align: center; color: var(--primary-red); text-transform: uppercase; font-size: 1.2em; margin: 10px 0; }
        
        #presence-count { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 15px; font-size: 0.7em; z-index: 1000; pointer-events: none;display:flex;
    align-items:center;
    gap:6px; }
         .online-dot{
    display:inline-block;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00ff00;
    animation:blinkOnline 1s infinite;
}

@keyframes blinkOnline{
    0%,100%{
        opacity:1;
        box-shadow:0 0 10px #00ff00;
    }
    50%{
        opacity:0.25;
        box-shadow:0 0 2px #00ff00;
    }
}
        .tables-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 15px; }
        .table-card { 
            background: white; padding: 10px 2px; text-align: center; border-radius: 12px; cursor: pointer; 
            border: 2px solid #ddd; box-shadow: 0 3px 0 #ccc; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 90px; 
            position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            grid-column: span 2;
        }
        
        .full-width { grid-column: span 6; }
        .half-width { grid-column: span 3; }

        .table-card strong, .table-card span { position: relative; z-index: 10; }
        .table-card strong { font-size: 0.85em; color: #333; margin-bottom: 5px; }
        .table-price { color: var(--primary-red); font-weight: bold; font-size: 0.85em; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; }
        .table-time { font-size: 0.7em; color: #666; margin-top: 6px; font-weight: 500; }
        
        @keyframes pulse-green { 0% { background-color: #fff; } 50% { background-color: #e8f5e9; } 100% { background-color: #fff; } }
        .has-guest { animation: pulse-green 2s infinite; border-color: var(--success-green); }
        .active { border-color: var(--blue) !important; background: #e3f2fd !important; transform: scale(1.05); z-index: 20; animation: none !important; }

        @keyframes pulse-rgb-bg {
            0% { background-color: #fff1f1; }
            33% { background-color: #f1fff1; }
            66% { background-color: #f1f1ff; }
            100% { background-color: #fff1f1; }
        }

        @keyframes pulse-rgb-total {
            0% { background-color: #fff1f1; }
            25% { background-color: #f1fff1; }
            50% { background-color: #f1f1ff; }
            75% { background-color: #fffbf1; }
            100% { background-color: #fff1f1; }
        }

        .is-locked { animation: pulse-rgb-bg 1.5s infinite !important; border-color: transparent !important; }
        .is-locked::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            animation: rotate-led 3s linear infinite; z-index: 1;
        }
        .is-locked::after {
            content: ""; position: absolute; inset: 4px; background: inherit; border-radius: 8px; z-index: 2;
        }

        .is-locked-special { animation: pulse-rgb-bg 1s infinite !important; border-color: transparent !important; }
        .is-locked-special::before {
            content: ""; position: absolute; inset: 0; border-radius: 12px; padding: 4px;
            background: linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ff0000);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: blink-rgb 1s linear infinite; z-index: 5;
        }

        @keyframes rotate-led { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink-rgb { 0%, 100% { opacity: 1; filter: hue-rotate(0deg); } 50% { opacity: 0.3; filter: hue-rotate(360deg); } }
        
        .flash-add { background-color: #c8e6c9 !important; }
        .flash-sub { background-color: #ffcdd2 !important; }

        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .category-title { background: #eee; padding: 8px 12px; font-weight: bold; margin-top: 15px; border-radius: 6px; color: #555; font-size: 0.85em; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; padding-left: 10px; border-radius: 8px; margin-bottom: 2px; transition: 0.2s; }
        
        .qty-1 { background-color: #fffde7; border-left: 5px solid #fff59d; }
        .qty-2 { background-color: #fff9c4; border-left: 5px solid #fff176; }
        .qty-3 { background-color: #fff59d; border-left: 5px solid #ffee58; }
        .qty-4 { background-color: #fff176; border-left: 5px solid #ffeb3b; }
        .qty-5 { background-color: #ffecb3; border-left: 5px solid #ffc107; }

        .item-info b { font-size: 0.95em; display: block; margin-bottom: 2px; }
        .item-info small { color: var(--primary-red); font-weight: 600; font-size: 0.85em; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 45px; height: 45px; border: none; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-sub { background: #f5f5f5; color: #999; }
        .btn-add { background: #e8f5e9; color: var(--success-green); }
        .qty-num { width: 25px; text-align: center; font-weight: bold; font-size: 1.1em; }

        .bill-box { border: 2.5px solid #333; padding: 12px; background: #fff; border-radius: 8px; margin-top: 10px; overflow: hidden; }
        .bill-row { 
            display: grid; grid-template-columns: 1fr auto 10px auto; align-items: center;
            padding: 12px 0; border-bottom: 1px dashed #ddd; opacity: 0; transform: translateX(-10px); 
            animation: slideInBill 0.4s ease forwards;
        }
        .bill-row .item-name { text-align: left; font-size: 1.15em; font-weight: 500; padding-right: 10px; line-height: 1.3; color: #111; }
        .bill-row .item-qty { font-weight: 800; color: #000; text-align: right; min-width: 35px; font-size: 1.25em; }
        .bill-row .divider { height: 100%; border-left: 2px solid #333; margin: 0 10px; grid-column: 3; }
        .bill-row .item-price { color: var(--primary-red); font-weight: 700; text-align: right; min-width: 90px; font-size: 1.1em; }

        @keyframes slideInBill { to { opacity: 1; transform: translateX(0); } }
        
        .total-container { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.2em; font-weight: 900; margin-top: 15px; color: var(--primary-red); 
            padding: 18px 8px; border-top: 3px solid #333; gap: 5px;
            animation: pulse-rgb-total 2s infinite ease-in-out;
            border-radius: 0 0 5px 5px;
            overflow: hidden;
        }
        .total-label-wrapper { display: flex; align-items: center; gap: 5px; min-width: 0; flex-shrink: 1; }
        #txt-total-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85em; }
        
        #txt-lang-flag { font-size: 1.4em; flex-shrink: 0; }

        .arrow-container { flex-grow: 1; display: flex; align-items: center; position: relative; height: 35px; min-width: 20px; }
        .arrow-shaft { height: 10px; background: rgba(0,0,0,0.05); flex-grow: 1; position: relative; border-radius: 5px 0 0 5px; overflow: hidden; }
        .arrow-shaft::after {
            content: ''; position: absolute; top: 0; left: -100%; height: 100%; width: 100%;
            background: linear-gradient(to right, transparent, var(--primary-red), var(--primary-red));
            animation: shaftFlow 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        .arrow-head { width: 22px; height: 26px; background: rgba(0,0,0,0.05); clip-path: polygon(0% 0%, 100% 50%, 0% 100%); margin-left: -2px; position: relative; display: flex; align-items: center; flex-shrink: 0; }
        .arrow-head::after {
            content: ''; position: absolute; inset: 0; background: var(--primary-red); opacity: 0;
            animation: headGlowRed 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 8px var(--primary-red));
        }

        @keyframes shaftFlow { 0% { left: -100%; } 60%, 100% { left: 100%; } }
        @keyframes headGlowRed { 0%, 50% { opacity: 0; transform: scale(0.9); } 65% { opacity: 1; transform: scale(1.1); } 85%, 100% { opacity: 0; transform: scale(1); } }

        .total-pop { animation: popScale 0.4s ease; }
        @keyframes popScale { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .btn-action { border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 12px; color: white; cursor: pointer; font-size: 1.1em; }
        #reset-area { text-align: center; margin-top: 40px; display: none; }
        #reset-area button { color: #ccc; border: 1px solid #eee; background: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7em; }
        
        .lang-btn { flex: 1; padding: 10px 2px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75em; font-weight: bold; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .lang-btn span:first-child { font-size: 1.8em; line-height: 1; }
        .lang-btn:active { background: #f0f0f0; }
        .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="presence-count">
    <span class="online-dot"></span>
    👥 Online: <span id="online-val">1</span>
</div>
<h2>CƠM BÉ TRÂM</h2>

<div class="tables-container">
    <div class="table-card" id="tab-1" onclick="selectTable(1)"><strong>Bàn 1</strong><span class="table-price" id="sum-1">0đ</span><span class="table-time" id="time-1"></span></div>
    <div class="table-card" id="tab-2" onclick="selectTable(2)"><strong>Bàn 2</strong><span class="table-price" id="sum-2">0đ</span><span class="table-time" id="time-2"></span></div>
    <div class="table-card" id="tab-3" onclick="selectTable(3)"><strong>Bàn 3</strong><span class="table-price" id="sum-3">0đ</span><span class="table-time" id="time-3"></span></div>
    <div class="table-card" id="tab-4" onclick="selectTable(4)"><strong>Bàn 4</strong><span class="table-price" id="sum-4">0đ</span><span class="table-time" id="time-4"></span></div>
    <div class="table-card" id="tab-5" onclick="selectTable(5)"><strong>Bàn 5</strong><span class="table-price" id="sum-5">0đ</span><span class="table-time" id="time-5"></span></div>
    <div class="table-card" id="tab-6" onclick="selectTable(6)"><strong>Bàn 6</strong><span class="table-price" id="sum-6">0đ</span><span class="table-time" id="time-6"></span></div>
    
    <div class="table-card full-width" id="tab-7" onclick="selectTable(7)"><strong>BÀN TRONG HIÊN</strong><span class="table-price" id="sum-7">0đ</span><span class="table-time" id="time-7"></span></div>
    
    <div class="table-card half-width" id="tab-8" onclick="selectTable(8)"><strong>NGOÀI ĐƯỜNG (TRÁI)</strong><span class="table-price" id="sum-8">0đ</span><span class="table-time" id="time-8"></span></div>
    <div class="table-card half-width" id="tab-9" onclick="selectTable(9)"><strong>NGOÀI ĐƯỜNG (PHẢI)</strong><span class="table-price" id="sum-9">0đ</span><span class="table-time" id="time-9"></span></div>
</div>

<div id="order-section" class="container" style="display:none;">
    <h3 id="table-title" style="text-align: center; margin-top:0; color:var(--blue);"></h3>
    <div id="menu-area">
        <div id="menu-list"></div>
        <button class="btn-action" style="background: var(--warning-orange)" onclick="setLock(true)">CHỐT ĐƠN & XEM BILL</button>
    </div>
    <div id="bill-area" style="display:none;">
        <div class="bill-box">
            <div id="bill-list"></div>
            <div class="total-container" id="total-container">
                <div class="total-label-wrapper">
                    <span id="txt-lang-flag"></span>
                    <span id="txt-total-label">TỔNG</span>
                </div>
                <div class="arrow-container">
                    <div class="arrow-shaft"></div>
                    <div class="arrow-head"></div>
                </div>
                <span style="white-space: nowrap; flex-shrink: 0;"><span id="bill-total">0</span>đ</span>
            </div>
        </div>
        <button class="btn-action" style="background: var(--blue)" onclick="setLock(false)">GỌI THÊM MÓN</button>
        <button class="btn-action" style="background: var(--success-green)" onclick="doPay()">XÁC NHẬN THANH TOÁN</button>
        
        <div class="lang-grid">
            <button class="lang-btn" onclick="changeBillLang('vi')"><span>🇻🇳</span><span>VN</span></button>
            <button class="lang-btn" onclick="changeBillLang('en')"><span>🇺🇸</span><span>EN</span></button>
            <button class="lang-btn" onclick="changeBillLang('fr')"><span>🇫🇷</span><span>FR</span></button>

            <button class="lang-btn" onclick="changeBillLang('jp')"><span>🇯🇵</span><span>JP</span></button>
            <button class="lang-btn" onclick="changeBillLang('th')"><span>🇹🇭</span><span>TH</span></button>
            <button class="lang-btn" onclick="changeBillLang('it')"><span>🇮🇹</span><span>IT</span></button>
            <button class="lang-btn" onclick="changeBillLang('pt')"><span>🇵🇹</span><span>PT</span></button>

            <button class="lang-btn" onclick="changeBillLang('es')"><span>🇪🇸</span><span>ES</span></button>
            <button class="lang-btn" onclick="changeBillLang('cn')"><span>🇨🇳</span><span>CN</span></button>
            <button class="lang-btn" onclick="changeBillLang('de')"><span>🇩🇪</span><span>DE</span></button>
            <button class="lang-btn" onclick="changeBillLang('ru')"><span>🇷🇺</span><span>RU</span></button>
            
            <button class="lang-btn" onclick="changeBillLang('be')"><span>🇧🇪</span><span>BE</span></button>
            <button class="lang-btn" onclick="changeBillLang('hu')"><span>🇭🇺</span><span>HU</span></button>
            <button class="lang-btn" onclick="changeBillLang('at')"><span>🇦́t</span><span>AT</span></button>
            <button class="lang-btn" onclick="changeBillLang('tw')"><span>🇹🇼</span><span>TW</span></button>
            
            <button class="lang-btn" onclick="changeBillLang('sg')"><span>🇸🇬</span><span>SG</span></button>
            <button class="lang-btn" onclick="changeBillLang('id')"><span>🇮🇩</span><span>ID</span></button>
            <button class="lang-btn" onclick="changeBillLang('my')"><span>🇲🇾</span><span>MY</span></button>
            <button class="lang-btn" onclick="changeBillLang('in')"><span>🇮🇳</span><span>IN</span></button>

            <button class="lang-btn" onclick="changeBillLang('fi')"><span>🇫🇮</span><span>FI</span></button>
            <button class="lang-btn" onclick="changeBillLang('nl')"><span>🇳🇱</span><span>NL</span></button>
            <button class="lang-btn" onclick="changeBillLang('se')"><span>🇸🇪</span><span>SE</span></button>
            <button class="lang-btn" onclick="changeBillLang('ch')"><span>🇨🇭</span><span>CH</span></button>
        </div>
    </div>
</div>

<div id="reset-area"><button onclick="doReset()">Xóa dữ liệu ngày mới</button></div>
<audio id="tingSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { 
        getDatabase, 
        ref, 
        child, 
        set, 
        remove, 
        onValue, 
        push, 
        onDisconnect 
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    import { menu } from "./menu.js";
    import { dict } from "./dict.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVgtCsFzrPOqRWBqoncZrsZsRdCn7wTWo",
        authDomain: "combetram.firebaseapp.com",
        databaseURL: "https://combetram-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "combetram",
        storageBucket: "combetram.firebasestorage.app",
        messagingSenderId: "727819537743",
        appId: "1:727819537743:web:36078910a5b351866f893a"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'combetram_v6_data');

    let currentBillLang = 'vi';
    let currentTab = null;
    let data = { orders: {}, locked: {}, times: {} };
    let firstLoad = true;

    function triggerHaptic(type) {
        if (!window.navigator || !window.navigator.vibrate) return;
        if (type === 'add') window.navigator.vibrate(15);
        else if (type === 'sub') window.navigator.vibrate([20, 40, 20]);
        else if (type === 'success') window.navigator.vibrate(60);
    }

    function animateNumber(elementId, newValue) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const startValue = parseInt(el.innerText.replace(/\D/g, '')) || 0;
        if (startValue === newValue) return; // Bảo vệ chống Layout Thrashing lặp lại vô ích
        
        const duration = 800;
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOutQuart = 1 - Math.pow(1 - progress, 4);
            const currentNumber = Math.floor(startValue + (newValue - startValue) * easeOutQuart);
            el.innerText = currentNumber.toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    const onlineRef = ref(database, '.info/connected');
    const presenceListRef = ref(database, 'combetram_v6_data/presence');
    const myPresenceRef = push(presenceListRef);

    onValue(onlineRef, (snap) => {
        if (snap.val() === true) {
            onDisconnect(myPresenceRef).remove();
            set(myPresenceRef, true);
        }
    });

    onValue(presenceListRef, (snap) => {
        const onlineValEl = document.getElementById('online-val');
        const count = snap.numChildren();
        if (onlineValEl.innerText !== String(count)) {
            onlineValEl.innerText = count;
        }
    });

    function renderMenu() {
        let h = "";
        menu.forEach(g => {
            h += `<div class="category-title">${g.cat}</div>`;
            g.items.forEach(i => {
                h += `<div class="menu-item" id="row-${i.id}">
                    <div class="item-info"><b>${i.name}</b><small>${i.price.toLocaleString()}đ</small></div>
                    <div class="controls">
                        <button class="btn-qty btn-sub" data-item-id="${i.id}">-</button>
                        <span class="qty-num" id="q-${i.id}">0</span>
                        <button class="btn-qty btn-add" data-item-id="${i.id}">+</button>
                    </div>
                </div>`;
            });
        });
        document.getElementById('menu-list').innerHTML = h;
    }
    renderMenu();

    // SỬA LỖI MEMORY LEAK: Sử dụng duy nhất 1 Event Delegation cho toàn bộ Menu List
    document.getElementById('menu-list').addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-qty');
        if (!btn) return;
        const itemId = parseInt(btn.dataset.itemId);
        const delta = btn.classList.contains('btn-add') ? 1 : -1;
        change(itemId, delta);
    });

    onValue(dbRef, snap => {
        const val = snap.val();
        if(val) {
            if(!firstLoad && JSON.stringify(val.orders) !== JSON.stringify(data.orders)) {
                document.getElementById('tingSound').play().catch(()=>{});
            }
            data = val;
            if(!data.orders) data.orders = {};
            if(!data.times) data.times = {};
            refresh();
            firstLoad = false;
        }
    });

    function selectTable(n) {
        triggerHaptic('add');
        currentTab = (currentTab === n) ? null : n;
        currentBillLang = 'vi';
        document.getElementById('order-section').style.display = currentTab ? 'block' : 'none';
        if(currentTab) {
            let title = "BÀN " + n;
            if(n === 7) title = "BÀN TRONG HIÊN";
            if(n === 8) title = "NGOÀI ĐƯỜNG (TRÁI)";
            if(n === 9) title = "NGOÀI ĐƯỜNG (PHẢI)";
            document.getElementById('table-title').innerText = title;
        }
        refresh();
    }

    function change(id, delta) {
        if(!currentTab || (data.locked && data.locked[currentTab])) return;
        triggerHaptic(delta > 0 ? 'add' : 'sub');
        let order = data.orders[currentTab] || {};
        if(Object.keys(order).length === 0 && delta > 0) set(child(dbRef, `times/${currentTab}`), Date.now());
        let q = (order[id] || 0) + delta;
        if(q <= 0) delete order[id]; else order[id] = q;
        set(child(dbRef, `orders/${currentTab}`), order);
        const row = document.getElementById(`row-${id}`);
        const tabBtn = document.getElementById(`tab-${currentTab}`);
        const cls = delta > 0 ? 'flash-add' : 'flash-sub';
        if(row) row.classList.add(cls); 
        if(tabBtn) tabBtn.classList.add(cls);
        setTimeout(() => { 
            if(row) row.classList.remove(cls); 
            if(tabBtn) tabBtn.classList.remove(cls); 
        }, 400);
    }

    function changeBillLang(l) { triggerHaptic('add'); currentBillLang = l; refresh(); }

    function refresh() {
        const all = menu.flatMap(g => g.items);
        let anyGuest = false;
        const now = Date.now();

        if(currentTab) {
            const isLock = (data.locked && data.locked[currentTab]) || false;
            document.getElementById('menu-area').style.display = isLock ? 'none' : 'block';
            document.getElementById('bill-area').style.display = isLock ? 'block' : 'none';
            all.forEach(i => {
                const q = (data.orders[currentTab] && data.orders[currentTab][i.id]) || 0;
                const row = document.getElementById(`row-${i.id}`);
                const qSpan = document.getElementById(`q-${i.id}`);
                if (row && qSpan) {
                    // TỐI ƯU DOM: Chỉ update text và class nếu số lượng thực tế thay đổi
                    if (qSpan.innerText !== String(q)) {
                        qSpan.innerText = q;
                        row.className = 'menu-item'; // reset class
                        if(q >= 5) row.classList.add('qty-5'); else if(q > 0) row.classList.add('qty-' + q);
                    }
                }
            });
            if(isLock) {
                let h = ""; let t = 0; let my = data.orders[currentTab] || {};
                const langData = dict[currentBillLang] || dict['vi'];
                
                // TỐI ƯU DOM: Tránh ghi đè text tĩnh lặp đi lặp lại
                const lblTotal = document.getElementById('txt-total-label');
                const lblFlag = document.getElementById('txt-lang-flag');
                if (lblTotal.innerText !== langData.total) lblTotal.innerText = langData.total;
                if (lblFlag.innerText !== langData.flag) lblFlag.innerText = langData.flag;
                
                let idx = 0;
                for(let id in my) {
                    let itm = all.find(x => x.id == id);
                    if(itm) { 
                        let p = itm.price * my[id]; t += p; 
                        let nameShow = (currentBillLang !== 'vi' && langData.items && langData.items[itm.name]) ? langData.items[itm.name] : itm.name;
                        h += `<div class="bill-row" style="animation-delay: ${idx * 0.08}s">
                                <span class="item-name">${nameShow}</span>
                                <span class="item-qty">x${my[id]}</span>
                                <div class="divider"></div>
                                <span class="item-price">${p.toLocaleString()}đ</span>
                              </div>`; 
                        idx++;
                    }
                }
                
                // TỐI ƯU DOM: Chỉ nạp lại chuỗi HTML nếu danh sách món trong bill thay đổi
                const billListEl = document.getElementById('bill-list');
                const newHTML = h || "Trống";
                if (billListEl.innerHTML !== newHTML) {
                    billListEl.innerHTML = newHTML;
                }
                
                const bTotal = document.getElementById('bill-total');
                const tBox = document.getElementById('total-container');
                if(parseInt(bTotal.innerText.replace(/\D/g,'')) !== t) {
                    animateNumber('bill-total', t);
                    tBox.classList.add('total-pop');
                    setTimeout(() => tBox.classList.remove('total-pop'), 400);
                }
            }
        }

        for(let i=1; i<=9; i++) {
            let s = 0; let o = data.orders[i] || {};
            for(let id in o) { let itm = all.find(x => x.id == id); if(itm) s += itm.price * o[id]; }
            const isTabLocked = (data.locked && data.locked[i]) || false;
            if(s > 0 || isTabLocked) anyGuest = true;
            
            const sumEl = document.getElementById(`sum-${i}`);
            if(sumEl) {
                const curS = parseInt(sumEl.innerText.replace(/\D/g,'')) || 0;
                if(curS !== s) animateNumber(`sum-${i}`, s);
            }

            const timeSpan = document.getElementById(`time-${i}`);
            if(timeSpan) {
                let targetText = "";
                if(s > 0 && data.times && data.times[i]) {
                    const diff = Math.floor((now - data.times[i]) / 60000);
                    targetText = diff > 0 ? "⏱ " + diff + " phút" : "⏱ Mới vào";
                }
                if (timeSpan.innerText !== targetText) timeSpan.innerText = targetText;
            }

            const btn = document.getElementById(`tab-${i}`);
            if(btn) {
                const originalClasses = i === 7 ? "table-card full-width" : (i >= 8 ? "table-card half-width" : "table-card");
                let targetClassName = originalClasses;
                
                if(i === currentTab) targetClassName += ' active';
                if(isTabLocked) {
                    targetClassName += (i >= 7) ? ' is-locked-special' : ' is-locked';
                } else if(s > 0) { 
                    targetClassName += ' has-guest'; 
                }

                // TỐI ƯU DOM: Chỉ ghi đè class string nếu cấu trúc thực sự thay đổi
                if (btn.className !== targetClassName) {
                    btn.className = targetClassName;
                }
            }
        }
        
        const resetArea = document.getElementById('reset-area');
        const targetResetDisplay = anyGuest ? 'none' : 'block';
        if (resetArea.style.display !== targetResetDisplay) {
            resetArea.style.display = targetResetDisplay;
        }
    }

    function setLock(v) { triggerHaptic('success'); set(child(dbRef, `locked/${currentTab}`), v); if(!v) currentBillLang='vi'; }
    function doPay() {
        if(confirm("Xác nhận thanh toán?")) {
            triggerHaptic('success');
            remove(child(dbRef, `orders/${currentTab}`));
            remove(child(dbRef, `locked/${currentTab}`));
            remove(child(dbRef, `times/${currentTab}`));
            selectTable(null);
        }
    }
    function doReset() {
        if(prompt("Mật khẩu xóa dữ liệu:") === "123") {
            remove(child(dbRef, 'orders')); 
            remove(child(dbRef, 'locked')); 
            remove(child(dbRef, 'times'));
            location.reload();
        }
    }

    window.selectTable = selectTable;
    window.setLock = setLock;
    window.doPay = doPay;
    window.doReset = doReset;
    window.changeBillLang = changeBillLang;

    setInterval(refresh, 30000);
</script>
</body>
</html>
