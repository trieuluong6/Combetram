<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-id="th-modified">Cơm Bé Trâm - Quản lý</title>

    <style>
        :root { --primary-red: #d32f2f; --success-green: #4caf50; --warning-orange: #ff9800; --blue: #2196f3; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        
        /* --------------------------------------------------------------------------
           BỐ CỤC KHU VỰC TOP BAR: THẲNG HÀNG HOÀN HẢO
           -------------------------------------------------------------------------- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 0 4px;
            height: 30px;
        }

        /* VIÊN THUỐC THỜI TIẾT THỜI GIAN THỰC GÓC TRÁI */
        #weather-hub {
            background: #ffffff;
            color: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            transition: all 0.4s ease;
            height: 22px;
            box-sizing: border-box;
        }
        #weather-hub.wind-warning { background: #fffde7; border-color: var(--warning-orange); color: #5d4037; }
        #weather-hub.wind-danger { background: #ffebee; border-color: var(--primary-red); color: #b71c1c; animation: blinkDangerBorder 1s infinite; }
        @keyframes blinkDangerBorder { 0%, 100% { box-shadow: 0 0 4px var(--primary-red); } 50% { box-shadow: 0 0 10px var(--primary-red); } }

        .weather-divider { width: 1px; height: 12px; background: #cbd5e1; margin: 0 2px; }
        .weather-group { display: flex; align-items: center; gap: 4px; }

        /* SỐ NGƯỜI ONLINE GÓC PHẢI - ĐỒNG BỘ TRẮNG CHỮ ĐEN */
        #presence-count {
            background: #ffffff;
            color: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            height: 22px;
            box-sizing: border-box;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }
        .online-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; animation: blinkOnline 1s infinite; }
        @keyframes blinkOnline { 0%, 100% { opacity: 1; box-shadow: 0 0 8px #4caf50; } 50% { opacity: 0.3; box-shadow: 0 0 2px #4caf50; } }

        /* ==========================================================================
           HUY HIỆU TRẠNG THÁI KHÁCH HÀNG (VẮNG/BÌNH THƯỜNG/ĐÔNG)
           ========================================================================== */
        .status-container {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
            margin-top: 10px;
        }
        .status-badge {
            background: #ffffff;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            border: 2px solid #e2e8f0;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }
        /* Style Text/Icon nằm đè lên nền */
        .status-badge span { position: relative; z-index: 3; }

        /* 0-3 Bàn: Vắng khách (Nhấp nháy chậm) */
        .status-empty {
            color: #2e7d32;
            border-color: #a5d6a7;
            background: #e8f5e9;
            animation: pulse-empty 2.5s infinite ease-in-out;
        }
        @keyframes pulse-empty {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0px #81c784; }
            50% { opacity: 0.7; transform: scale(0.98); box-shadow: 0 0 8px #81c784; }
        }

        /* 4-6 Bàn: Bình thường (Nhấp nháy nhanh vừa) */
        .status-normal {
            color: #e65100;
            border-color: #ffcc80;
            background: #fff3e0;
            animation: pulse-normal 1.2s infinite ease-in-out;
        }
        @keyframes pulse-normal {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0px #ffb74d; }
            50% { opacity: 0.7; transform: scale(0.96); box-shadow: 0 0 10px #ffb74d; }
        }

        /* 7-9 Bàn: Đông khách (Đèn Police xoay) */
        /* --- CODE MỚI THAY THẾ --- */
        .status-crowded {
            color: #fff;
            background: #151515; /* Đổ nền đen trực tiếp cho gọn */
            border-color: #000;
            box-shadow: 0 2px 10px rgba(255, 0, 0, 0.4);
            /* Bùa chú ép trình duyệt điện thoại phải cắt gọn viền bo tròn, cấm lem */
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        /* Dải đèn LED xanh - đỏ hụ trên nắp */
        .status-crowded::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 300%; height: 3.5px;
            background: linear-gradient(90deg, #ff0000 0%, #151515 20%, #0044ff 40%, #151515 60%, #ff0000 80%, #0044ff 100%);
            animation: police-siren 1s linear infinite;
            z-index: 5;
        }

        /* Xóa bỏ cái phần lõi đen thừa thãi của code cũ */
        .status-crowded::after {
            display: none;
        }

        /* Hoạt ảnh đèn LED chạy */
        @keyframes police-siren {
            0% { transform: translateX(0); }
            100% { transform: translateX(-33.33%); }
        }

        /* TIÊU ĐỀ TÊN QUÁN */
        .header-title { text-align: center; color: var(--primary-red); text-transform: uppercase; font-size: 1.4em; font-weight: 900; margin: 10px 0 15px 0; letter-spacing: 0.5px; }

        /* HOẠT ẢNH ICON THỜI TIẾT SVG CHUẨN ĐẸP */
        .w-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }
        .anim-spin { animation: spin 10s linear infinite; transform-origin: center; }
        .anim-pulse { animation: pulseMoon 4s ease-in-out infinite; transform-origin: center; }
        .anim-cloud-move { animation: floatCloud 3s ease-in-out infinite; }
        .anim-rain { animation: rainDrop 0.8s linear infinite; }
        .anim-lightning { animation: flashLightning 2s ease-in-out infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseMoon { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } }
        @keyframes floatCloud { 0%, 100% { transform: translateX(0px); } 50% { transform: translateX(2.5px); } }
        @keyframes rainDrop { 0% { transform: translateY(-2px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(4px); opacity: 0; } }
        @keyframes flashLightning { 0%, 100%, 20%, 40% { opacity: 1; } 10%, 30% { opacity: 0.1; } }

        /* HOẠT ẢNH LUỒNG GIÓ THỔI ĐỘNG */
        .wind-line { stroke: currentColor; stroke-width: 2; stroke-linecap: round; animation: windBlow 1.4s linear infinite; }
        .w-slow { animation-duration: 1.4s; }
        .w-fast { animation-duration: 0.6s; }
        .w-storm { animation: windStorm 0.4s linear infinite; transform-origin: center; }
        
        @keyframes windBlow { 
            0% { transform: translateX(-5px); opacity: 0; } 
            30%, 70% { opacity: 1; }
            100% { transform: translateX(7px); opacity: 0; } 
        }
        @keyframes windStorm { 100% { transform: rotate(-360deg); } }

        /* MŨI TÊN XOAY HƯỚNG GIÓ 360 ĐỘ */
        .wind-arrow { width: 12px; height: 12px; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; fill: currentColor; }

        /* CẤU TRÚC ĐỒNG HỒ LẬT TĨNH CHUẨN MƯỢT */
        .flip-clock-container { display: flex; justify-content: center; align-items: center; gap: 4px; user-select: none; margin-bottom: 20px; }
        .flip-unit { display: flex; gap: 2px; }
        .flip-colon { font-size: 1.75em; font-weight: bold; color: #333; padding: 0 1px; line-height: 42px; height: 42px; display: flex; align-items: center; animation: blinkColon 1s infinite; }
        @keyframes blinkColon { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .flip-card { position: relative; width: 26px; height: 42px; perspective: 100px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 1.75em; font-weight: bold; }
        .card-half { position: absolute; left: 0; width: 100%; height: 50%; overflow: hidden; background: #fff; color: #000; box-sizing: border-box; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .card-top { top: 0; border-top-left-radius: 5px; border-top-right-radius: 5px; line-height: 42px; border-bottom: none; }
        .card-bottom { bottom: 0; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; line-height: 0px; border-top: 1px solid #f1f5f9; }
        .card-flip-wing { position: absolute; top: 0; left: 0; width: 100%; height: 50%; overflow: hidden; box-sizing: border-box; text-align: center; border-top-left-radius: 5px; border-top-right-radius: 5px; line-height: 42px; transform-origin: center bottom; backface-visibility: hidden; z-index: 5; background: #fff; color: #000; border: 1px solid #e2e8f0; border-bottom: none; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-flip-wing-back { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; overflow: hidden; box-sizing: border-box; text-align: center; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; line-height: 0px; transform-origin: center top; backface-visibility: hidden; z-index: 4; background: #fff; color: #000; border: 1px solid #e2e8f0; border-top: 1px solid #f1f5f9; transform: rotateX(180deg); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .flip-card.animate .card-flip-wing { transform: rotateX(-180deg); }
        .flip-card.animate .card-flip-wing-back { transform: rotateX(0deg); }

        /* HỆ THỐNG QUẢN LÝ BÀN ĂN */
        .tables-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 15px; }
        .table-card { background: white; padding: 10px 2px; text-align: center; border-radius: 12px; cursor: pointer; border: 2px solid #ddd; box-shadow: 0 3px 0 #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90px; position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); grid-column: span 2; }
        .full-width { grid-column: span 6; }
        .half-width { grid-column: span 3; }
        .table-card strong, .table-card span { position: relative; z-index: 10; }
        .table-card strong { font-size: 0.85em; color: #333; margin-bottom: 5px; }
        .table-price { color: var(--primary-red); font-weight: bold; font-size: 0.85em; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; }
        .table-time { font-size: 0.7em; color: #666; margin-top: 6px; font-weight: 500; }
        @keyframes pulse-green { 0% { background-color: #fff; } 50% { background-color: #e8f5e9; } 100% { background-color: #fff; } }
        .has-guest { animation: pulse-green 2s infinite; border-color: var(--success-green); }
        .active { border-color: var(--blue) !important; background: #e3f2fd !important; transform: scale(1.05); z-index: 20; animation: none !important; }
        @keyframes pulse-rgb-bg { 0% { background-color: #fff1f1; } 33% { background-color: #f1fff1; } 66% { background-color: #f1f1ff; } 100% { background-color: #fff1f1; } }
        @keyframes pulse-rgb-total { 0% { background-color: #fff1f1; } 25% { background-color: #f1fff1; } 50% { background-color: #f1f1ff; } 75% { background-color: #fffbf1; } 100% { background-color: #fff1f1; } }
        .is-locked { animation: pulse-rgb-bg 1.5s infinite !important; border-color: transparent !important; }
        .is-locked::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); animation: rotate-led 3s linear infinite; z-index: 1; }
        .is-locked::after { content: ""; position: absolute; inset: 4px; background: inherit; border-radius: 8px; z-index: 2; }
        .is-locked-special { animation: pulse-rgb-bg 1s infinite !important; border-color: transparent !important; }
        .is-locked-special::before { content: ""; position: absolute; inset: 0; border-radius: 12px; padding: 4px; background: linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ff0000); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; animation: blink-rgb 1s linear infinite; z-index: 5; }
        @keyframes rotate-led { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink-rgb { 0%, 100% { opacity: 1; filter: hue-rotate(0deg); } 50% { opacity: 0.3; filter: hue-rotate(360deg); } }
        .flash-add { background-color: #c8e6c9 !important; }
        .flash-sub { background-color: #ffcdd2 !important; }
        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .category-title { background: #eee; padding: 8px 12px; font-weight: bold; margin-top: 15px; border-radius: 6px; color: #555; font-size: 0.85em; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; padding-left: 10px; border-radius: 8px; margin-bottom: 2px; transition: 0.2s; }
        .qty-1 { background-color: #fffde7; border-left: 5px solid #fff59d; }
        .qty-2 { background-color: #fff9c4; border-left: 5px solid #fff176; }
        .qty-3 { background-color: #fff59d; border-left: 5px solid #ffee58; }
        .qty-4 { background-color: #fff176; border-left: 5px solid #ffeb3b; }
        .qty-5 { background-color: #ffecb3; border-left: 5px solid #ffc107; }
        .item-info b { font-size: 0.95em; display: block; margin-bottom: 2px; }
        .item-info small { color: var(--primary-red); font-weight: 600; font-size: 0.85em; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 45px; height: 45px; border: none; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-sub { background: #f5f5f5; color: #999; }
        .btn-add { background: #e8f5e9; color: var(--success-green); }
        .qty-num { width: 25px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .bill-box { border: 2.5px solid #333; padding: 12px; background: #fff; border-radius: 8px; margin-top: 10px; overflow: hidden; }
        .bill-row { display: grid; grid-template-columns: 1fr auto 10px auto; align-items: center; padding: 12px 0; border-bottom: 1px dashed #ddd; opacity: 0; transform: translateX(-10px); animation: slideInBill 0.4s ease forwards; }
        .bill-row .item-name { text-align: left; font-size: 1.15em; font-weight: 500; padding-right: 10px; line-height: 1.3; color: #111; }
        .bill-row .item-qty { font-weight: 800; color: #000; text-align: right; min-width: 35px; font-size: 1.25em; }
        .bill-row .divider { height: 100%; border-left: 2px solid #333; margin: 0 10px; grid-column: 3; }
        .bill-row .item-price { color: var(--primary-red); font-weight: 700; text-align: right; min-width: 90px; font-size: 1.1em; }
        @keyframes slideInBill { to { opacity: 1; transform: translateX(0); } }
        .total-container { display: flex; justify-content: space-between; align-items: center; font-size: 1.2em; font-weight: 900; margin-top: 15px; color: var(--primary-red); padding: 18px 8px; border-top: 3px solid #333; gap: 5px; animation: pulse-rgb-total 2s infinite ease-in-out; border-radius: 0 0 5px 5px; overflow: hidden; }
        .total-label-wrapper { display: flex; align-items: center; gap: 5px; min-width: 0; flex-shrink: 1; }
        #txt-total-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85em; }
        .lang-btn { flex: 1; padding: 10px 2px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75em; font-weight: bold; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .lang-btn span:first-child { font-size: 1.8em; line-height: 1; }
        .lang-btn:active { background: #f0f0f0; }
        .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 20px; }
        #txt-lang-flag { font-size: 1.4em; flex-shrink: 0; }
        .arrow-container { flex-grow: 1; display: flex; align-items: center; position: relative; height: 35px; min-width: 20px; }
        .arrow-shaft { height: 10px; background: rgba(0,0,0,0.05); flex-grow: 1; position: relative; border-radius: 5px 0 0 5px; overflow: hidden; }
        .arrow-shaft::after { content: ''; position: absolute; top: 0; left: -100%; height: 100%; width: 100%; background: linear-gradient(to right, transparent, var(--primary-red), var(--primary-red)); animation: shaftFlow 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .arrow-head { width: 22px; height: 26px; background: rgba(0,0,0,0.05); clip-path: polygon(0% 0%, 100% 50%, 0% 100%); margin-left: -2px; position: relative; display: flex; align-items: center; flex-shrink: 0; }
        .arrow-head::after { content: ''; position: absolute; inset: 0; background: var(--primary-red); opacity: 0; animation: headGlowRed 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1); filter: drop-shadow(0 0 8px var(--primary-red)); }
        @keyframes shaftFlow { 0% { left: -100%; } 60%, 100% { left: 100%; } }
        @keyframes headGlowRed { 0%, 50% { opacity: 0; transform: scale(0.9); } 65% { opacity: 1; transform: scale(1.1); } 85%, 100% { opacity: 0; transform: scale(1); } }
        .total-pop { animation: popScale 0.4s ease; }
        @keyframes popScale { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .btn-action { border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 12px; color: white; cursor: pointer; font-size: 1.1em; }
        #reset-area { text-align: center; margin-top: 40px; display: none; }
        #reset-area button { color: #ccc; border: 1px solid #eee; background: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7em; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather-hub">
        <div class="weather-group">
            <span id="w-icon-container"></span>
            <span id="w-temp">--°C</span>
        </div>
        <div class="weather-divider"></div>
        <div class="weather-group">
            <span id="w-wind-icon-container"></span>
            <span id="w-wind-speed">-- km/h</span>
            <svg class="wind-arrow" id="w-arrow" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        </div>
    </div>

    <div id="presence-count">
        <span class="online-dot"></span>
        👥 Online: <span id="online-val">1</span>
    </div>
</div>

<div class="status-container">
    <div id="crowd-status" class="status-badge status-empty">
        <span id="crowd-icon">🟢</span>
        <span id="crowd-text">Vắng khách</span>
    </div>
</div>

<div class="header-title">CƠM BÉ TRÂM</div>

<div class="flip-clock-container">
    <div class="flip-unit">
        <div class="flip-card" id="c-h1"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
        <div class="flip-card" id="c-h2"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
    </div>
    <div class="flip-colon">:</div>
    <div class="flip-unit">
        <div class="flip-card" id="c-m1"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
        <div class="flip-card" id="c-m2"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
    </div>
    <div class="flip-colon">:</div>
    <div class="flip-unit">
        <div class="flip-card" id="c-s1"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
        <div class="flip-card" id="c-s2"><div class="card-half card-top">0</div><div class="card-half card-bottom">0</div><div class="card-flip-wing">0</div><div class="card-flip-wing-back">0</div></div>
    </div>
</div>

<div class="tables-container">
    <div class="table-card" id="tab-1" onclick="selectTable(1)"><strong>Bàn 1</strong><span class="table-price" id="sum-1">0đ</span><span class="table-time" id="time-1"></span></div>
    <div class="table-card" id="tab-2" onclick="selectTable(2)"><strong>Bàn 2</strong><span class="table-price" id="sum-2">0đ</span><span class="table-time" id="time-2"></span></div>
    <div class="table-card" id="tab-3" onclick="selectTable(3)"><strong>Bàn 3</strong><span class="table-price" id="sum-3">0đ</span><span class="table-time" id="time-3"></span></div>
    <div class="table-card" id="tab-4" onclick="selectTable(4)"><strong>Bàn 4</strong><span class="table-price" id="sum-4">0đ</span><span class="table-time" id="time-4"></span></div>
    <div class="table-card" id="tab-5" onclick="selectTable(5)"><strong>Bàn 5</strong><span class="table-price" id="sum-5">0đ</span><span class="table-time" id="time-5"></span></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, child, set, remove, onValue, push, onDisconnect } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    import { menu } from "./menu.js";
    import { dict } from "./dict.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVgtCsFzrPOqRWBqoncZrsZsRdCn7wTWo",
        authDomain: "combetram.firebaseapp.com",
        databaseURL: "https://combetram-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "combetram",
        storageBucket: "combetram.firebasestorage.app",
        messagingSenderId: "727819537743",
        appId: "1:727819537743:web:36078910a5b351866f893a"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'combetram_v6_data');

    let currentBillLang = 'vi';
    let currentTab = null;
    let data = { orders: {}, locked: {}, times: {} };
    let firstLoad = true;

    // CACHE DỮ LIỆU GỐC ĐỂ PHỤC VỤ GIẢ LẬP ĐỘNG KHÔNG CALL API LIÊN TỤC
    let weatherCache = { status: 'cloudy', temp: 31, windSpeed: 14.0, windDir: 135 };

    // THƯ VIỆN SVG CHỨA CẢ THỜI TIẾT BAN NGÀY VÀ CÁC TRẠNG THÁI TRĂNG ĐÊM
    const SVG_ICONS = {
        sunny: `<svg class="w-icon anim-spin" viewBox="0 0 24 24" style="color:#ffa000;"><circle cx="12" cy="12" r="4" fill="#ffa000"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,
        partlyCloudy: `
<svg class="w-icon" viewBox="0 0 24 24">
    <g class="anim-spin">
        <circle cx="8" cy="8" r="3" fill="#ffa000"/>
        <path d="M8 2v2M8 12v2M2 8h2M12 8h2M4 4l1.4 1.4M10.6 10.6L12 12M4 12l1.4-1.4M10.6 5.4L12 4"
              stroke="#ffa000"
              stroke-width="1.5"
              fill="none"/>
    </g>

    <g class="anim-cloud-move">
        <path d="M18 12a4 4 0 0 0-7.5-1.5
                 A3 3 0 0 0 8 16
                 h10
                 a3 3 0 0 0 0-6z"
              fill="#b0bec5"/>
    </g>
</svg>
`,
        // CÁC THỂ LOẠI TRĂNG CHO TRỜI QUANG BAN ĐÊM
        night_fullmoon: `<svg class="w-icon anim-pulse" viewBox="0 0 24 24" style="color:#fbc02d;"><circle cx="12" cy="12" r="7" fill="#fff59d" stroke="#fbc02d" stroke-width="1.5"/></svg>`,
        night_crescent: `<svg class="w-icon anim-pulse" viewBox="0 0 24 24" style="color:#fbc02d;"><path d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 1-9-9z" fill="#fff59d" stroke="#fbc02d" stroke-width="1.5"/></svg>`,
        night_nomoon: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#94a3b8;"><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="6" cy="7" r="1" fill="currentColor"/><circle cx="18" cy="8" r="1" fill="currentColor"/><circle cx="15" cy="17" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1" fill="currentColor"/></svg>`,
night_partlyCloudy: `
<svg class="w-icon" viewBox="0 0 24 24">
    <path d="M9 3a7 7 0 1 0 7 7 7.5 7.5 0 0 1-7-7z"
          fill="#fff59d"
          stroke="#fbc02d"
          stroke-width="1"/>

    <path class="anim-cloud-move"
          d="M18 12a4 4 0 0 0-7.5-1.5
             A3 3 0 0 0 8 16
             h10
             a3 3 0 0 0 0-6z"
          fill="#b0bec5"/>
</svg>
`,
        cloudy: `<svg class="w-icon anim-cloud-move" viewBox="0 0 24 24" style="color:#78909c;"><path d="M18 10a5 5 0 0 0-9.53-1.8 4 4 0 0 0-3.47 4A4 4 0 0 0 9 16h9a4 4 0 0 0 0-8z" fill="#b0bec5"/></svg>`,
        rainy: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#1e88e5;"><path class="anim-cloud-move" d="M18 10a5 5 0 0 0-9.53-1.8 4 4 0 0 0-3.47 4A4 4 0 0 0 9 16h9a4 4 0 0 0 0-8z" fill="#90a4ae"/><path class="anim-rain" d="M9 18v2M12 19v2M15 18v2"/></svg>`,
        storm: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#455a64;"><path class="anim-cloud-move" d="M18 10a5 5 0 0 0-9.53-1.8 4 4 0 0 0-3.47 4A4 4 0 0 0 9 16h9a4 4 0 0 0 0-8z" fill="#37474f"/><path class="anim-lightning" d="M12 15l-2 3h4l-2 3" fill="#ffeb3b" stroke="none"/></svg>`,
        
        windNone: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#94a3b8;"><path d="M5 12h14M7 16h10"/></svg>`,
        windSlow: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#0d9488;"><path class="wind-line w-slow" d="M3 9h12M5 13h14"/></svg>`,
        windFast: `<svg class="w-icon" viewBox="0 0 24 24" style="color:#ea580c;"><path class="wind-line w-fast" d="M2 7h16M5 12h12M3 17h10"/></svg>`,
        windStorm: `<svg class="w-icon w-storm" viewBox="0 0 24 24" style="color:#991b1b;"><circle cx="12" cy="12" r="9" stroke-dasharray="6 4"/><path d="M12 7v10M7 12h10"/></svg>`
    };

    function renderWeather(status, temp, windSpeed, windDir) {
        let finalStatus = status;
        
        // KIỂM TRA ĐIỀU KIỆN BAN ĐÊM (Từ 18h tối đến trước 6h sáng)
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 6) {
            const dayOfMonth = new Date().getDate();
            let moonType;
            if (dayOfMonth % 3 === 0) moonType = 'night_fullmoon';
            else if (dayOfMonth % 3 === 1) moonType = 'night_crescent';
            else moonType = 'night_nomoon';

            if (status === 'sunny') finalStatus = moonType;
            else if (status === 'partlyCloudy') finalStatus = 'night_partlyCloudy';
        }

        document.getElementById('w-icon-container').innerHTML = SVG_ICONS[finalStatus] || SVG_ICONS.sunny;
        document.getElementById('w-temp').innerText = `${temp.toFixed(1)}°C`;

        const hub = document.getElementById('weather-hub');
        let windIcon = SVG_ICONS.windNone;
        hub.className = ''; 

        if (windSpeed > 5 && windSpeed <= 19) {
            windIcon = SVG_ICONS.windSlow;
        } else if (windSpeed >= 20 && windSpeed <= 39) {
            windIcon = SVG_ICONS.windFast;
            hub.classList.add('wind-warning'); 
        } else if (windSpeed >= 40) {
            windIcon = SVG_ICONS.windStorm;
            hub.classList.add('wind-danger');  
        }
        document.getElementById('w-wind-icon-container').innerHTML = windIcon;
        // HIỂN THỊ SỐ THẬP PHÂN PHÍA SAU CHO TỐC ĐỘ GIÓ
        document.getElementById('w-wind-speed').innerText = `${windSpeed.toFixed(1)} km/h`;
        document.getElementById('w-arrow').style.transform = `rotate(${windDir}deg)`;
    }

    // TÍCH HỢP HỆ THỐNG FETCH API THỜI TIẾT THỜI GIAN THỰC (OPEN-METEO)
    async function fetchRealtimeWeather() {
        try {
            const lat = 16.0544;
            const lon = 108.2022;
            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m`);
            if(!response.ok) return;
            const resData = await response.json();
            const current = resData.current;

            let status = 'sunny';
            const code = current.weather_code;

            if (code === 0) status = 'sunny';
            else if (code === 1 || code === 2 || code === 3) status = 'partlyCloudy';
            else if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) status = 'rainy';
            else if (code >= 95) status = 'storm';

            weatherCache = {
                status: status,
                temp: current.temperature_2m,
                windSpeed: current.wind_speed_10m,
                windDir: current.wind_direction_10m
            };

            renderWeather(weatherCache.status, weatherCache.temp, weatherCache.windSpeed, weatherCache.windDir);
        } catch (err) {
            console.error("Lỗi gọi API thời tiết:", err);
            renderWeather(weatherCache.status, weatherCache.temp, weatherCache.windSpeed, weatherCache.windDir);
        }
    }

    function simulateWeatherFluctuation() {
        const tempOffset = (Math.random() - 0.5) * 0.4;       
        const windSpeedOffset = (Math.random() - 0.5) * 0.6;  
        const windDirOffset = Math.floor((Math.random() - 0.5) * 4); 

        const simulatedTemp = Math.max(10, Math.min(45, weatherCache.temp + tempOffset));
        const simulatedWindSpeed = Math.max(0, Math.min(120, weatherCache.windSpeed + windSpeedOffset));
        const simulatedWindDir = (weatherCache.windDir + windDirOffset + 360) % 360;

        renderWeather(weatherCache.status, simulatedTemp, simulatedWindSpeed, simulatedWindDir);
    }

    fetchRealtimeWeather();
    setInterval(fetchRealtimeWeather, 600000);
    setInterval(simulateWeatherFluctuation, 5000);

    function updateCardValue(cardId, targetVal) {
        const card = document.getElementById(cardId);
        if (!card) return;
        const topHalf = card.querySelector('.card-top');
        const bottomHalf = card.querySelector('.card-bottom');
        const wing = card.querySelector('.card-flip-wing');
        const wingBack = card.querySelector('.card-flip-wing-back');

        if (topHalf.innerText === targetVal) return;

        wing.innerText = topHalf.innerText;
        wingBack.innerText = targetVal;
        card.classList.add('animate');

        setTimeout(() => { topHalf.innerText = targetVal; }, 160);
        setTimeout(() => {
            bottomHalf.innerText = targetVal;
            wing.innerText = targetVal;
            card.classList.remove('animate');
        }, 340);
    }

    function runClock() {
        const d = new Date();
        const hStr = String(d.getHours()).padStart(2, '0');
        const mStr = String(d.getMinutes()).padStart(2, '0');
        const sStr = String(d.getSeconds()).padStart(2, '0');
        updateCardValue('c-h1', hStr[0]); updateCardValue('c-h2', hStr[1]);
        updateCardValue('c-m1', mStr[0]); updateCardValue('c-m2', mStr[1]);
        updateCardValue('c-s1', sStr[0]); updateCardValue('c-s2', sStr[1]);
    }

    const currentInit = new Date();
    const ih = String(currentInit.getHours()).padStart(2, '0'), im = String(currentInit.getMinutes()).padStart(2, '0'), is = String(currentInit.getSeconds()).padStart(2, '0');
    ['h1','h2','m1','m2','s1','s2'].forEach((k, idx) => {
        let v = (idx < 2) ? ih[idx] : (idx < 4 ? im[idx-2] : is[idx-4]);
        const c = document.getElementById('c-' + k);
        if(c) c.querySelectorAll('.card-half, .card-flip-wing, .card-flip-wing-back').forEach(el => el.innerText = v);
    });
    setInterval(runClock, 1000);

    function triggerHaptic(type) {
        if (!window.navigator || !window.navigator.vibrate) return;
        if (type === 'add') window.navigator.vibrate(15);
        else if (type === 'sub') window.navigator.vibrate([20, 40, 20]);
        else if (type === 'success') window.navigator.vibrate(60);
    }

    function animateNumber(elementId, newValue) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const startValue = parseInt(el.innerText.replace(/\D/g, '')) || 0;
        if (startValue === newValue) return;
        const duration = 800; const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOutQuart = 1 - Math.pow(1 - progress, 4);
            el.innerText = Math.floor(startValue + (newValue - startValue) * easeOutQuart).toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    const onlineRef = ref(database,'.info/connected');
    const presenceListRef = ref(database,'combetram_v6_data/presence');
    const myPresenceRef = push(presenceListRef);

    onValue(onlineRef, (snap) => {
        if (snap.val() === true) {
            onDisconnect(myPresenceRef).remove();
            set(myPresenceRef, true);
        }
    });

    onValue(presenceListRef, (snap) => {
        document.getElementById('online-val').innerText = snap.numChildren();
    });

    function renderMenu() {
        let h = "";
        menu.forEach(g => {
            h += `<div class="category-title">${g.cat}</div>`;
            g.items.forEach(i => {
                h += `<div class="menu-item" id="row-${i.id}">
                    <div class="item-info"><b>${i.name}</b><small>${i.price.toLocaleString()}đ</small></div>
                    <div class="controls">
                        <button class="btn-qty btn-sub" data-item-id="${i.id}">-</button>
                        <span class="qty-num" id="q-${i.id}">0</span>
                        <button class="btn-qty btn-add" data-item-id="${i.id}">+</button>
                    </div>
                </div>`;
            });
        });
        document.getElementById('menu-list').innerHTML = h;
    }
    renderMenu();

    document.getElementById('menu-list').addEventListener('click', (e) => {
        const btn = e.target.closest('.btn-qty'); if (!btn) return;
        const itemId = parseInt(btn.dataset.itemId);
        change(itemId, btn.classList.contains('btn-add') ? 1 : -1);
    });

    onValue(dbRef, snap => {
        const val = snap.val();
        if(val) {
            if(!firstLoad && JSON.stringify(val.orders) !== JSON.stringify(data.orders)) document.getElementById('tingSound').play().catch(()=>{});
            data = val; if(!data.orders) data.orders = {}; if(!data.times) data.times = {};
            refresh(); firstLoad = false;
        }
    });

    function selectTable(n) {
        triggerHaptic('add'); currentTab = (currentTab === n) ? null : n; currentBillLang = 'vi';
        document.getElementById('order-section').style.display = currentTab ? 'block' : 'none';
        if(currentTab) {
            let title = "BÀN " + n;
            if(n === 7) title = "BÀN TRONG HIÊN"; if(n === 8) title = "NGOÀI ĐƯỜNG (TRÁI)"; if(n === 9) title = "NGOÀI ĐƯỜNG (PHẢI)";
            document.getElementById('table-title').innerText = title;
        }
        refresh();
    }

    function change(id, delta) {
        if(!currentTab || (data.locked && data.locked[currentTab])) return;
        triggerHaptic(delta > 0 ? 'add' : 'sub');
        let order = data.orders[currentTab] || {};
        if(Object.keys(order).length === 0 && delta > 0) set(child(dbRef, `times/${currentTab}`), Date.now());
        let q = (order[id] || 0) + delta; if(q <= 0) delete order[id]; else order[id] = q;
        set(child(dbRef, `orders/${currentTab}`), order);
        const row = document.getElementById(`row-${id}`), tabBtn = document.getElementById(`tab-${currentTab}`), cls = delta > 0 ? 'flash-add' : 'flash-sub';
        if(row) row.classList.add(cls); if(tabBtn) tabBtn.classList.add(cls);
        setTimeout(() => { if(row) row.classList.remove(cls); if(tabBtn) tabBtn.classList.remove(cls); }, 400);
    }

    function changeBillLang(l) { triggerHaptic('add'); currentBillLang = l; refresh(); document.querySelector('.bill-box')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }

    function refresh() {
        const all = menu.flatMap(g => g.items); let anyGuest = false; const now = Date.now();
        let activeTablesCount = 0; // Biến đếm số lượng bàn đang hoạt động

        if(currentTab) {
            const isLock = (data.locked && data.locked[currentTab]) || false;
            document.getElementById('menu-area').style.display = isLock ? 'none' : 'block';
            document.getElementById('bill-area').style.display = isLock ? 'block' : 'none';
            all.forEach(i => {
                const q = (data.orders[currentTab] && data.orders[currentTab][i.id]) || 0;
                const row = document.getElementById(`row-${i.id}`), qSpan = document.getElementById(`q-${i.id}`);
                if (row && qSpan && qSpan.innerText !== String(q)) {
                    qSpan.innerText = q; row.className = 'menu-item';
                    if(q >= 5) row.classList.add('qty-5'); else if(q > 0) row.classList.add('qty-' + q);
                }
            });
            if(isLock) {
                let h = "", t = 0, my = data.orders[currentTab] || {}, langData = dict[currentBillLang] || dict['vi'];
                document.getElementById('txt-total-label').innerText = langData.total;
                document.getElementById('txt-lang-flag').innerText = langData.flag;
                let idx = 0;
                for(let id in my) {
                    let itm = all.find(x => x.id == id);
                    if(itm) {
                        let p = itm.price * my[id]; t += p;
                        let nameShow = (currentBillLang !== 'vi' && langData.items && langData.items[itm.name]) ? langData.items[itm.name] : itm.name;
                        h += `<div class="bill-row" style="animation-delay: ${idx * 0.08}s">
                                <span class="item-name">${nameShow}</span>
                                <span class="item-qty">x${my[id]}</span>
                                <div class="divider"></div>
                                <span class="item-price">${p.toLocaleString()}đ</span>
                              </div>`; idx++;
                    }
                }
                document.getElementById('bill-list').innerHTML = h || "Trống";
                const bTotal = document.getElementById('bill-total'), tBox = document.getElementById('total-container');
                if(parseInt(bTotal.innerText.replace(/\D/g,'')) !== t) {
                    animateNumber('bill-total', t); tBox.classList.add('total-pop'); setTimeout(() => tBox.classList.remove('total-pop'), 400);
                }
            }
        }

        // Quét qua 9 bàn để cập nhật UI từng bàn và đếm số bàn đang bận
        for(let i=1; i<=9; i++) {
            let s = 0, o = data.orders[i] || {}; 
            for(let id in o) { 
                let itm = all.find(x => x.id == id); 
                if(itm) s += itm.price * o[id]; 
            }
            const sTabLocked = (data.locked && data.locked[i]) || false; 
            if(s > 0 || sTabLocked) {
                anyGuest = true;
                activeTablesCount++; // Bàn có khách -> tăng biến đếm
            }
            const sumEl = document.getElementById(`sum-${i}`); if(sumEl && parseInt(sumEl.innerText.replace(/\D/g,'')) !== s) animateNumber(`sum-${i}`, s);
            const timeSpan = document.getElementById(`time-${i}`);
            if(timeSpan) {
                let txt = ""; if(s > 0 && data.times && data.times[i]) { const diff = Math.floor((now - data.times[i]) / 60000); txt = diff > 0 ? "⏱ " + diff + " phút" : "⏱ Mới vào"; }
                if (timeSpan.innerText !== txt) timeSpan.innerText = txt;
            }
            const btn = document.getElementById(`tab-${i}`);
            if(btn) {
                let targetClassName = i === 7 ? "table-card full-width" : (i >= 8 ? "table-card half-width" : "table-card");
                if(i === currentTab) targetClassName += ' active';
                if(sTabLocked) targetClassName += (i >= 7) ? ' is-locked-special' : ' is-locked'; else if(s > 0) targetClassName += ' has-guest';
                if (btn.className !== targetClassName) btn.className = targetClassName;
            }
        }

        // --- XỬ LÝ LOGIC HUY HIỆU TRẠNG THÁI KHÁCH ---
        const crowdEl = document.getElementById('crowd-status');
        const crowdTxt = document.getElementById('crowd-text');
        const crowdIcon = document.getElementById('crowd-icon');

        if (crowdEl && crowdTxt && crowdIcon) {
            if (activeTablesCount <= 3) {
                crowdEl.className = 'status-badge status-empty';
                crowdTxt.innerText = 'Vắng khách';
                crowdIcon.innerText = '🟢';
            } else if (activeTablesCount <= 6) {
                crowdEl.className = 'status-badge status-normal';
                crowdTxt.innerText = 'Bình thường';
                crowdIcon.innerText = '🟡';
            } else {
                crowdEl.className = 'status-badge status-crowded';
                crowdTxt.innerText = 'ĐÔNG KHÁCH';
                crowdIcon.innerText = '🚨';
            }
        }

        document.getElementById('reset-area').style.display = anyGuest ? 'none' : 'block';
    }

    function setLock(v) { triggerHaptic('success'); set(child(dbRef, `locked/${currentTab}`), v); if(!v) currentBillLang='vi'; }
    function doPay() {
        if(confirm("Xác nhận thanh toán?")) {
            triggerHaptic('success'); remove(child(dbRef, `orders/${currentTab}`)); remove(child(dbRef, `locked/${currentTab}`)); remove(child(dbRef, `times/${currentTab}`)); selectTable(null);
        }
    }
    function doReset() {
        if(prompt("Mật khẩu xóa dữ liệu:") === "123") {
            remove(child(dbRef, 'orders')); remove(child(dbRef, 'locked')); remove(child(dbRef, 'times')); location.reload();
        }
    }

    window.selectTable = selectTable; window.setLock = setLock; window.doPay = doPay; window.doReset = doReset; window.changeBillLang = changeBillLang;
    setInterval(refresh, 30000);
</script>
</body>
</html>
