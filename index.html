    <style>
        :root { --primary-red: #d32f2f; --success-green: #4caf50; --warning-orange: #ff9800; --blue: #2196f3; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        h2 { text-align: center; color: var(--primary-red); text-transform: uppercase; font-size: 1.2em; margin: 10px 0; }
        
        #presence-count { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 15px; font-size: 0.7em; z-index: 1000; pointer-events: none; }

        .tables-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 15px; }
        .table-card { 
            background: white; padding: 10px 2px; text-align: center; border-radius: 12px; cursor: pointer; 
            border: 2px solid #ddd; box-shadow: 0 3px 0 #ccc; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 90px; 
            position: relative; overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            grid-column: span 2;
        }
        
        .full-width { grid-column: span 6; }
        .half-width { grid-column: span 3; }

        .table-card strong, .table-card span { position: relative; z-index: 10; }
        .table-card strong { font-size: 0.85em; color: #333; margin-bottom: 5px; }
        .table-price { color: var(--primary-red); font-weight: bold; font-size: 0.85em; background: rgba(255,255,255,0.8); padding: 2px 6px; border-radius: 4px; }
        .table-time { font-size: 0.7em; color: #666; margin-top: 6px; font-weight: 500; }
        
        @keyframes pulse-green { 0% { background-color: #fff; } 50% { background-color: #e8f5e9; } 100% { background-color: #fff; } }
        .has-guest { animation: pulse-green 2s infinite; border-color: var(--success-green); }
        .active { border-color: var(--blue) !important; background: #e3f2fd !important; transform: scale(1.05); z-index: 20; animation: none !important; }

        @keyframes pulse-rgb-bg {
            0% { background-color: #fff1f1; }
            33% { background-color: #f1fff1; }
            66% { background-color: #f1f1ff; }
            100% { background-color: #fff1f1; }
        }

        @keyframes pulse-rgb-total {
            0% { background-color: #fff1f1; }
            25% { background-color: #f1fff1; }
            50% { background-color: #f1f1ff; }
            75% { background-color: #fffbf1; }
            100% { background-color: #fff1f1; }
        }

        .is-locked { animation: pulse-rgb-bg 1.5s infinite !important; border-color: transparent !important; }
        .is-locked::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            animation: rotate-led 3s linear infinite; z-index: 1;
        }
        .is-locked::after {
            content: ""; position: absolute; inset: 4px; background: inherit; border-radius: 8px; z-index: 2;
        }

        .is-locked-special { animation: pulse-rgb-bg 1s infinite !important; border-color: transparent !important; }
        .is-locked-special::before {
            content: ""; position: absolute; inset: 0; border-radius: 12px; padding: 4px;
            background: linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ff0000);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: blink-rgb 1s linear infinite; z-index: 5;
        }

        @keyframes rotate-led { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink-rgb { 0%, 100% { opacity: 1; filter: hue-rotate(0deg); } 50% { opacity: 0.3; filter: hue-rotate(360deg); } }
        
        .flash-add { background-color: #c8e6c9 !important; }
        .flash-sub { background-color: #ffcdd2 !important; }

        .container { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .category-title { background: #eee; padding: 8px 12px; font-weight: bold; margin-top: 15px; border-radius: 6px; color: #555; font-size: 0.85em; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; padding-left: 10px; border-radius: 8px; margin-bottom: 2px; transition: 0.2s; }
        
        .qty-1 { background-color: #fffde7; border-left: 5px solid #fff59d; }
        .qty-2 { background-color: #fff9c4; border-left: 5px solid #fff176; }
        .qty-3 { background-color: #fff59d; border-left: 5px solid #ffee58; }
        .qty-4 { background-color: #fff176; border-left: 5px solid #ffeb3b; }
        .qty-5 { background-color: #ffecb3; border-left: 5px solid #ffc107; }

        .item-info b { font-size: 0.95em; display: block; margin-bottom: 2px; }
        .item-info small { color: var(--primary-red); font-weight: 600; font-size: 0.85em; }
        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 45px; height: 45px; border: none; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-sub { background: #f5f5f5; color: #999; }
        .btn-add { background: #e8f5e9; color: var(--success-green); }
        .qty-num { width: 25px; text-align: center; font-weight: bold; font-size: 1.1em; }

        .bill-box { border: 2.5px solid #333; padding: 12px; background: #fff; border-radius: 8px; margin-top: 10px; overflow: hidden; }
        .bill-row { 
            display: grid; grid-template-columns: 1fr auto 10px auto; align-items: center;
            padding: 12px 0; border-bottom: 1px dashed #ddd; opacity: 0; transform: translateX(-10px); 
            animation: slideInBill 0.4s ease forwards;
        }
        .bill-row .item-name { text-align: left; font-size: 1.15em; font-weight: 500; padding-right: 10px; line-height: 1.3; color: #111; }
        .bill-row .item-qty { font-weight: 800; color: #000; text-align: right; min-width: 35px; font-size: 1.25em; }
        .bill-row .divider { height: 100%; border-left: 2px solid #333; margin: 0 10px; grid-column: 3; }
        .bill-row .item-price { color: var(--primary-red); font-weight: 700; text-align: right; min-width: 90px; font-size: 1.1em; }

        @keyframes slideInBill { to { opacity: 1; transform: translateX(0); } }
        
        .total-container { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.2em; font-weight: 900; margin-top: 15px; color: var(--primary-red); 
            padding: 18px 8px; border-top: 3px solid #333; gap: 5px;
            animation: pulse-rgb-total 2s infinite ease-in-out;
            border-radius: 0 0 5px 5px;
            overflow: hidden;
        }
        .total-label-wrapper { display: flex; align-items: center; gap: 5px; min-width: 0; flex-shrink: 1; }
        #txt-total-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85em; }
        
        #txt-lang-flag { font-size: 1.4em; flex-shrink: 0; }

        .arrow-container { flex-grow: 1; display: flex; align-items: center; position: relative; height: 35px; min-width: 20px; }
        .arrow-shaft { height: 10px; background: rgba(0,0,0,0.05); flex-grow: 1; position: relative; border-radius: 5px 0 0 5px; overflow: hidden; }
        .arrow-shaft::after {
            content: ''; position: absolute; top: 0; left: -100%; height: 100%; width: 100%;
            background: linear-gradient(to right, transparent, var(--primary-red), var(--primary-red));
            animation: shaftFlow 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }
        .arrow-head { width: 22px; height: 26px; background: rgba(0,0,0,0.05); clip-path: polygon(0% 0%, 100% 50%, 0% 100%); margin-left: -2px; position: relative; display: flex; align-items: center; flex-shrink: 0; }
        .arrow-head::after {
            content: ''; position: absolute; inset: 0; background: var(--primary-red); opacity: 0;
            animation: headGlowRed 1.2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 8px var(--primary-red));
        }

        @keyframes shaftFlow { 0% { left: -100%; } 60%, 100% { left: 100%; } }
        @keyframes headGlowRed { 0%, 50% { opacity: 0; transform: scale(0.9); } 65% { opacity: 1; transform: scale(1.1); } 85%, 100% { opacity: 0; transform: scale(1); } }

        .total-pop { animation: popScale 0.4s ease; }
        @keyframes popScale { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .btn-action { border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 12px; color: white; cursor: pointer; font-size: 1.1em; }
        #reset-area { text-align: center; margin-top: 40px; display: none; }
        #reset-area button { color: #ccc; border: 1px solid #eee; background: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7em; }
        
        .lang-btn { flex: 1; padding: 10px 2px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75em; font-weight: bold; color: #555; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .lang-btn span:first-child { font-size: 1.8em; line-height: 1; }
        .lang-btn:active { background: #f0f0f0; }
        .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 20px; }
    </style>

    function triggerHaptic(type) {
        if (!window.navigator || !window.navigator.vibrate) return;
        if (type === 'add') window.navigator.vibrate(15);
        else if (type === 'sub') window.navigator.vibrate([20, 40, 20]);
        else if (type === 'success') window.navigator.vibrate(60);
    }

    function animateNumber(elementId, newValue) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const startValue = parseInt(el.innerText.replace(/\D/g, '')) || 0;
        const duration = 800;
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOutQuart = 1 - Math.pow(1 - progress, 4);
            const currentNumber = Math.floor(startValue + (newValue - startValue) * easeOutQuart);
            el.innerText = currentNumber.toLocaleString();
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    function renderMenu() {
        let h = "";
        menu.forEach(g => {
            h += `<div class="category-title">${g.cat}</div>`;
            g.items.forEach(i => {

    function selectTable(n) {
        triggerHaptic('add');
        currentTab = (currentTab === n) ? null : n;

        document.getElementById('order-section').style.display = currentTab ? 'block' : 'none';

            if(n === 8) title = "NGOÀI ĐƯỜNG (TRÁI)";
            if(n === 9) title = "NGOÀI ĐƯỜNG (PHẢI)";
            document.getElementById('table-title').innerText = title;
        }
        refresh();
    }

    function change(id, delta) {
        if(!currentTab || (data.locked && data.locked[currentTab])) return;
        triggerHaptic(delta > 0 ? 'add' : 'sub');
        let order = data.orders[currentTab] || {};
        if(Object.keys(order).length === 0 && delta > 0) db.child('times').child(currentTab).set(Date.now());
        let q = (order[id] || 0) + delta;
        if(q <= 0) delete order[id]; else order[id] = q;
        db.child('orders').child(currentTab).set(order);
        const row = document.getElementById(`row-${id}`);
        const tabBtn = document.getElementById(`tab-${currentTab}`);
        const cls = delta > 0 ? 'flash-add' : 'flash-sub';
        row.classList.add(cls); tabBtn.classList.add(cls);
        setTimeout(() => { row.classList.remove(cls); tabBtn.classList.remove(cls); }, 400);
    }

    function changeBillLang(l) { triggerHaptic('add'); currentBillLang = l; refresh(); }

    function refresh() {
        const all = menu.flatMap(g => g.items);
        let anyGuest = false;
        const now = Date.now();

        if(currentTab) {
            const isLock = (data.locked && data.locked[currentTab]) || false;
            document.getElementById('menu-area').style.display = isLock ? 'none' : 'block';
            document.getElementById('bill-area').style.display = isLock ? 'block' : 'none';
            all.forEach(i => {
                const q = (data.orders[currentTab] && data.orders[currentTab][i.id]) || 0;
                const row = document.getElementById(`row-${i.id}`);
                const qSpan = document.getElementById(`q-${i.id}`);
                if (row && qSpan) {
                    qSpan.innerText = q;
                    row.classList.remove('qty-1','qty-2','qty-3','qty-4','qty-5');
                    if(q >= 5) row.classList.add('qty-5'); else if(q > 0) row.classList.add('qty-' + q);
                }
            });
            if(isLock) {
                let h = ""; let t = 0; let my = data.orders[currentTab] || {};
                const langData = dict[currentBillLang] || dict['vi'];
                document.getElementById('txt-total-label').innerText = langData.total;
                document.getElementById('txt-lang-flag').innerText = langData.flag;
                
                let idx = 0;
                for(let id in my) {
                    let itm = all.find(x => x.id == id);
                    if(itm) { 
                        let p = itm.price * my[id]; t += p; 
                        let nameShow = (currentBillLang !== 'vi' && langData.items && langData.items[itm.name]) ? langData.items[itm.name] : itm.name;
                        h += `<div class="bill-row" style="animation-delay: ${idx * 0.08}s">
                                <span class="item-name">${nameShow}</span>
                                <span class="item-qty">x${my[id]}</span>
                                <div class="divider"></div>
                                <span class="item-price">${p.toLocaleString()}đ</span>
                              </div>`; 
                        idx++;
                    }
                }
                document.getElementById('bill-list').innerHTML = h || "Trống";
                const bTotal = document.getElementById('bill-total');
                const tBox = document.getElementById('total-container');
                if(parseInt(bTotal.innerText.replace(/\D/g,'')) !== t) {
                    animateNumber('bill-total', t);
                    tBox.classList.add('total-pop');
                    setTimeout(() => tBox.classList.remove('total-pop'), 400);
                }
            }
        }

        for(let i=1; i<=9; i++) {
            let s = 0; let o = data.orders[i] || {};
            for(let id in o) { let itm = all.find(x => x.id == id); if(itm) s += itm.price * o[id]; }
            const isTabLocked = (data.locked && data.locked[i]) || false;
            if(s > 0 || isTabLocked) anyGuest = true;
            
            const sumEl = document.getElementById(`sum-${i}`);
            if(sumEl) {
                const curS = parseInt(sumEl.innerText.replace(/\D/g,'')) || 0;
                if(curS !== s) animateNumber(`sum-${i}`, s);
            }

            const timeSpan = document.getElementById(`time-${i}`);
            if(timeSpan) {
                if(s > 0 && data.times && data.times[i]) {
                    const diff = Math.floor((now - data.times[i]) / 60000);
                    timeSpan.innerText = diff > 0 ? "⏱ " + diff + " phút" : "⏱ Mới vào";
                } else { timeSpan.innerText = ""; }
            }

            const btn = document.getElementById(`tab-${i}`);
            if(btn) {
                const originalClasses = i === 7 ? "table-card full-width" : (i >= 8 ? "table-card half-width" : "table-card");

                if(isTabLocked) {
                    if(i >= 7) btn.classList.add('is-locked-special');
                    else btn.classList.add('is-locked');
                } else if(s > 0) { btn.classList.add('has-guest'); }
            }
        }
